<div style="padding: 5px 30px;">
  <!-- FactorModule -->
  @if (isFactorModule) {
    <app-factor-emission-module [module]="getFactorModule()" [calculationID]="calculationId" [factorManager]="factorManager"></app-factor-emission-module>
  }

  <!-- Other Modules -->
  @if (!isFactorModule) {
    <app-type-emission-module [module]="getTypeModule()" [calculationID]="calculationId" [factorManager]="factorManager"></app-type-emission-module>
  }
</div>
<app-footer></app-footer>
